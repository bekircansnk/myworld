name: Jules Queue Manager

on:
  schedule:
    - cron: '*/10 * * * *' # Her 10 dakikada bir çalışır (GitHub Actions limitleri dahilinde en stabil aralık)
  workflow_dispatch: # Manuel olarak tetiklenebilir

jobs:
  manage-queue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Queue Manager
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        run: |
          python3 scripts/auto_trigger_queue.py
