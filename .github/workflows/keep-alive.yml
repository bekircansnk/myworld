name: Backend Keep Alive Ping

on:
  schedule:
    - cron: '*/5 * * * *' # Pings every 5 minutes
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: curl -sSf https://myworld-twqx.onrender.com/docs > /dev/null || echo "Ping failed but continuing"
