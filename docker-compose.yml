version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: myworld_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-myworld}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-myworld_secret}
      POSTGRES_DB: ${DB_NAME:-myworld}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: myworld_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
